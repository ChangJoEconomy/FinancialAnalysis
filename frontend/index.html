<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 주식 분석 서비스</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #202124;
        background: #f7f8fa;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .layout {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
        margin-top: 28px;
      }

      section {
        background: #fff;
        border: 1px solid #dfe3ea;
        border-radius: 8px;
        padding: 20px;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 20px;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        min-height: 40px;
        border: 1px solid #c9d1dc;
        border-radius: 6px;
        padding: 0 10px;
        font-size: 15px;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        color: #fff;
        background: #1b5e3f;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        color: #1b5e3f;
        background: #e4f1ea;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .wide {
        grid-column: 1 / -1;
      }

      .result-list {
        display: grid;
        gap: 8px;
        margin: 12px 0 0;
        padding: 0;
        list-style: none;
      }

      .result-list li {
        margin: 0;
      }

      .result-button {
        display: grid;
        width: 100%;
        min-height: 56px;
        justify-items: start;
        gap: 4px;
        border: 1px solid #d7e0da;
        color: #17201a;
        background: #f8fbf9;
        text-align: left;
      }

      .result-button span,
      .history-list span {
        color: #5f6b7a;
        font-size: 13px;
        font-weight: 400;
      }

      .history-list {
        display: grid;
        gap: 8px;
        margin: 12px 0 0;
        padding: 0;
        list-style: none;
      }

      .history-list li {
        display: grid;
        gap: 4px;
        border-bottom: 1px solid #edf0f4;
        padding: 8px 0;
      }

      .status {
        margin-top: 20px;
        color: #445064;
        font-weight: 700;
      }

      pre {
        overflow: auto;
        min-height: 132px;
        margin: 12px 0 0;
        border-radius: 8px;
        background: #161b22;
        color: #e6edf3;
        padding: 16px;
        font-size: 13px;
      }

      @media (max-width: 720px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI 주식 분석 서비스</h1>
      <p>Supabase Auth와 서비스 사용자 프로필 연결을 확인하는 개발용 화면입니다.</p>

      <div class="layout">
        <section>
          <h2>회원가입</h2>
          <form data-signup-form>
            <label>
              이메일
              <input name="email" type="email" autocomplete="email" required />
            </label>
            <label>
              닉네임
              <input name="nickname" type="text" autocomplete="nickname" required />
            </label>
            <label>
              비밀번호
              <input name="password" type="password" autocomplete="new-password" minlength="6" required />
            </label>
            <button type="submit">회원가입</button>
          </form>
        </section>

        <section>
          <h2>로그인</h2>
          <form data-login-form>
            <label>
              이메일
              <input name="email" type="email" autocomplete="email" required />
            </label>
            <label>
              비밀번호
              <input name="password" type="password" autocomplete="current-password" minlength="6" required />
            </label>
            <div class="actions">
              <button type="submit">로그인</button>
              <button class="secondary" type="button" data-me-button>내 정보</button>
              <button class="secondary" type="button" data-logout-button>로그아웃</button>
            </div>
          </form>
        </section>

        <section class="wide">
          <h2>종목 검색</h2>
          <form data-stock-search-form>
            <label>
              검색어
              <input data-stock-search-input type="search" value="삼성전자" />
            </label>
            <button type="submit">검색</button>
          </form>
          <ul class="result-list" data-stock-search-results>
            <li>검색 결과가 없습니다.</li>
          </ul>
        </section>

        <section class="wide">
          <h2>최근 검색 기록</h2>
          <ul class="history-list" data-search-histories>
            <li>로그인 후 확인할 수 있습니다.</li>
          </ul>
        </section>
      </div>

      <p class="status" data-auth-status>로그인 전입니다.</p>
      <pre data-auth-user>로그인된 사용자가 없습니다.</pre>
    </main>
    <script type="module" src="./pages/auth.js"></script>
  </body>
</html>
